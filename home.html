<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MineCraft Mod Description</title>
<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #eef0ff;
}

/* 左側メニュー */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: #333;
  color: white;
  padding-top: 60px;
  transform: translateX(-250px);
  transition: 0.3s;
  z-index: 1000;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover {
  background: #444;
}

/* ハンバーガーボタン */
.menu-btn {
  position: fixed;
  left: 10px;
  top: 10px;
  font-size: 30px;
  cursor: pointer;
  color: #333;
  z-index: 1100;
}

/* メインコンテンツ */
.content {
  padding: 20px;
  transition: margin-left 0.3s;
}

.section {
  background: white;
  padding: 20px;
  margin: 20px auto;
  border-radius: 10px;
  max-width: 800px;
  box-shadow: 0 0 10px #ccc;
}

img {
  max-width: 100%;
  border-radius: 10px;
}
</style>

<script>
function toggleMenu() {
  const sidebar = document.getElementById("sidebar");
  const content = document.getElementById("content");

  if (sidebar.style.transform === "translateX(0px)") {
    sidebar.style.transform = "translateX(-250px)";
    content.style.marginLeft = "0px";
  } else {
    sidebar.style.transform = "translateX(0px)";
    content.style.marginLeft = "250px";
  }
}

// ページ読み込み時に overview に移動
window.onload = function() {
  location.hash = "#overview";
};
</script>

</head>
<body>

<!-- ハンバーガーメニュー -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- 左側メニュー -->
<div id="sidebar" class="sidebar">
  <a href="#overview">🔧 MOD概要</a>
  <a href="#screenshot">📸 スクリーンショット</a>
  <a href="#items">📦 追加アイテム</a>
  <a href="#blocks">
